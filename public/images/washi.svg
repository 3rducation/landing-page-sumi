<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240">
  <defs>
    <filter id="washiFiber" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.8" numOctaves="3" seed="7" stitchTiles="stitch" result="fib"/>
      <feColorMatrix in="fib" type="saturate" values="0"/>
    </filter>
    <filter id="washiGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#washiFiber)" opacity="0.14"/>
  <rect width="100%" height="100%" filter="url(#washiGrain)" opacity="0.07"/>
</svg>
